<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Elections Intelligence Center — Harris County local election operations dashboard.">
  <title>ELECTIONS INTELLIGENCE CENTER // HARRIS + FORT BEND COUNTY OPS</title>
  <style>
    /* ================================================================
       DESIGN TOKENS — OPS PALETTE
    ================================================================ */
    :root {
      --bg:           #ffffff;
      --bg-2:         #f8fafc;
      --surface:      #ffffff;
      --surface-hi:   #f1f5f9;
      --surface-soft: #f8fafc;
      --text:         #1e293b;
      --text-bright:  #0f172a;
      --muted:        #64748b;
      --muted-2:      #94a3b8;
      --line:         rgba(30,64,175,0.12);
      --line-hi:      rgba(30,64,175,0.26);
      --brand:        #2563eb;
      --brand-dim:    #1d4ed8;
      --brand-soft:   rgba(37,99,235,0.07);
      --amber:        #d97706;
      --amber-dim:    #b45309;
      --amber-soft:   rgba(217,119,6,0.09);
      --red:          #dc2626;
      --red-dim:      #b91c1c;
      --red-soft:     rgba(220,38,38,0.08);
      --blue:         #0891b2;
      --blue-dim:     #0e7490;
      --blue-soft:    rgba(8,145,178,0.08);
      --purple:       #7c3aed;
      --purple-soft:  rgba(124,58,237,0.08);
      --glow-sm:   0 1px 3px rgba(15,23,42,0.06);
      --glow:      0 4px 12px rgba(15,23,42,0.08);
      --glow-lg:   0 10px 30px rgba(15,23,42,0.10);
      --radius:    4px;
      --radius-md: 8px;
      --font-mono: 'JetBrains Mono','Cascadia Code','SF Mono','Consolas','Liberation Mono','Courier New',monospace;
      --font-sans: 'Inter','Segoe UI','Helvetica Neue',system-ui,sans-serif;
      color-scheme: light;
      font-family: var(--font-mono);
    }

    /* ================================================================
       BASE RESET
    ================================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      padding-top: 26px;   /* classification banner */
      padding-bottom: 30px;
      font-size: 15px;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(30,64,175,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,64,175,0.025) 1px, transparent 1px),
        radial-gradient(ellipse at 15% 0%, rgba(37,99,235,0.04), transparent 55%),
        radial-gradient(ellipse at 85% 0%, rgba(100,120,200,0.03), transparent 50%);
      background-size: 48px 48px, 48px 48px, 100% 100%, 100% 100%;
      line-height: 1.6;
    }

    /* Scanline removed for light theme */

    a { color: var(--brand); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button, input, select { font: inherit; cursor: pointer; }
    :focus-visible { outline: 1px solid var(--brand); outline-offset: 3px; border-radius: 3px; }

    .shell { width: min(1280px, calc(100% - 32px)); margin: 0 auto; }
