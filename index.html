<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Texas Election Watch Board</title>
  <meta name="description" content="County-level Texas presidential election results, 2012–2024. A self-contained data dashboard." />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div class="brand">
        <span class="star" aria-hidden="true">★</span>
        <div>
          <h1>Texas Election Watch Board</h1>
          <p class="subtitle" id="subtitle">County-level presidential results</p>
        </div>
      </div>
      <div class="year-picker" id="yearPicker" role="tablist" aria-label="Election year"></div>
    </div>
  </header>

  <main class="wrap" id="app">
    <p id="loadError" class="load-error" hidden></p>

    <section class="cards" id="summaryCards" aria-label="Statewide summary"></section>

    <section class="grid-2">
      <div class="panel">
        <div class="panel-head">
          <h2>Statewide trend</h2>
          <p class="muted">Two-party vote share &amp; margin, 2012–2024</p>
        </div>
        <div id="trendChart" class="chart" role="img" aria-label="Statewide vote share trend chart"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2 id="mapTitle">County map</h2>
          <p class="muted">Margin by county — hover for detail</p>
        </div>
        <div id="mapWrap" class="map-wrap">
          <div id="map" class="map" role="img" aria-label="Texas county results map"></div>
          <div id="mapTooltip" class="map-tooltip" hidden></div>
        </div>
        <div id="mapLegend" class="legend" aria-hidden="true"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head"><h2 id="highlightsTitle">Highlights</h2></div>
      <div class="highlights" id="highlights"></div>
    </section>

    <section class="panel">
      <div class="panel-head table-head">
        <div>
          <h2>County results</h2>
          <p class="muted" id="tableCaption"></p>
        </div>
        <input type="search" id="search" class="search" placeholder="Search county…" aria-label="Search county" />
      </div>
      <div class="table-scroll">
        <table id="countyTable" class="county-table">
          <thead><tr id="tableHeaderRow"></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p id="sources" class="sources"></p>
      <p class="disclaimer" id="disclaimer"></p>
      <p class="muted" id="generated"></p>
    </div>
  </footer>

  <script src="assets/app.js" type="module"></script>
</body>
</html>
