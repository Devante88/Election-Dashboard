name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      # Reproducible install from the committed package-lock.json.
      - name: Install dev dependencies (jsdom, resvg)
        run: npm ci

      # Data invariants + cross-check vs the official canvass + jsdom render check.
      - name: Validate data and render
        run: npm run validate

      # Unit + integration tests for the data-pipeline scripts (mock FEC, etc.).
      - name: Run tests
        run: npm test

      # Fail if the committed research HTML is stale vs docs/*.md.
      - name: Docs build in sync
        run: |
          node scripts/build-docs.mjs
          git diff --exit-code -- public/ \
            || { echo "::error::public/ is stale — run 'npm run build-docs' and commit."; exit 1; }

      # Serve the site, drive the real app.js headlessly, screenshot the map.
      - name: Smoke-test the running app
        run: npm run smoke -- --out=screenshots

      - name: Upload map screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tx-map-screenshots
          path: screenshots/*.png
          if-no-files-found: ignore
